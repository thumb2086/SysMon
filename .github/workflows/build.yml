name: Build EXE

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyinstaller psutil

      - run: pyinstaller --onefile --windowed --name SysMon SysMon/netmon.py

      - uses: actions/upload-artifact@v4
        with:
          name: SysMon
          path: dist/SysMon.exe

      - if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SysMon.exe
