name: Build EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyinstaller psutil

      - run: pyinstaller --onefile --windowed --name SysMon netmon.py

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/SysMon.exe
